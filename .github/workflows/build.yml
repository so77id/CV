name: Build and Publish CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile resume-en.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-en.tex
          latexmk_use_xelatex: true

      - name: Compile resume-es.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-es.tex
          latexmk_use_xelatex: true

      - name: Stage site
        run: |
          mkdir -p site
          cp resume-en.pdf resume-es.pdf site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
