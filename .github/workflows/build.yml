name: Build and Publish CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.lang }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [en, es]
    steps:
      - uses: actions/checkout@v4

      - name: Compile resume-${{ matrix.lang }}.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-${{ matrix.lang }}.tex
          latexmk_use_xelatex: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-${{ matrix.lang }}
          path: resume-${{ matrix.lang }}.pdf

  package:
    name: Package site
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all resume artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage site
        run: |
          mkdir -p site
          cp artifacts/resume-en/resume-en.pdf site/
          cp artifacts/resume-es/resume-es.pdf site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
